##############################################################################
# Test Pyramid Pipeline
# ─────────────────────────────────────────────────────────────────────────
# Implements the 3-layer test pyramid from the test-automation-strategy skill:
#
#   Layer 1 — Unit tests      (70% of suite)  ← fastest, run first
#   Layer 2 — Integration tests (20%)          ← middle tier
#   Layer 3 — E2E / Playwright (10%)           ← slowest, gated on layers 1+2
#
# Fail-fast: each layer must be green before the next starts.
# Target total CI time: < 10 minutes (unit ≤ 5 min, integration ≤ 10 min, e2e ≤ 15 min).
##############################################################################

name: Test Pyramid

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Layer 1 — UNIT TESTS  (target: < 5 min)
  # Covers: pure functions, utility modules, permissions, currency, lab priority,
  #         queue utils, consultation transformers, hook logic (mocked deps).
  # ───────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Layer 1 — Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run tests/unit src/test --reporter=verbose --coverage
        timeout-minutes: 5

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # Layer 2 — INTEGRATION TESTS  (target: < 10 min)
  # Gated on unit tests passing.
  # Uses in-memory mocks — no live DB or network required.
  # ───────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Layer 2 — Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        timeout-minutes: 10

      - name: Run security tests
        run: npm run test:security
        timeout-minutes: 5
        continue-on-error: false

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: test-reports/integration-*.html
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # Layer 3 — E2E / PLAYWRIGHT  (target: < 15 min)
  # Gated on both unit and integration passing.
  # Runs critical-path user journeys only in CI (smoke + critical tags).
  # Full regression suite runs on scheduled nightly workflow.
  # ───────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "Layer 3 — E2E Critical Paths"
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only for CI speed)
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run critical E2E paths
        run: npx playwright test --grep "@critical|@smoke" --project=chromium --reporter=html,github
        timeout-minutes: 15
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Flaky Test Gate
  # Fails the pipeline if any quarantined test entry is overdue.
  # ───────────────────────────────────────────────────────────────────────────
  flaky-gate:
    name: "Flaky Registry Health Check"
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for overdue flaky entries
        run: |
          node -e "
          const { getOverdueEntries } = require('./tests/flaky-registry.ts');
          const overdue = getOverdueEntries();
          if (overdue.length > 0) {
            console.error('Overdue flaky tests:', JSON.stringify(overdue, null, 2));
            process.exit(1);
          }
          console.log('No overdue flaky test entries.');
          " || npx tsx -e "
          import { getOverdueEntries } from './tests/flaky-registry.ts';
          const overdue = getOverdueEntries();
          if (overdue.length > 0) {
            console.error('Overdue flaky tests (must be fixed or escalated):');
            overdue.forEach(e => console.error(\`  \${e.id}: \${e.testName} [fix by \${e.fixBy}]\`));
            process.exit(1);
          }
          console.log('All flaky entries within SLA.');
          "
        continue-on-error: true  # warn only; set to false to hard-fail

  # ───────────────────────────────────────────────────────────────────────────
  # Summary — reports pyramid health after all layers complete
  # ───────────────────────────────────────────────────────────────────────────
  pyramid-summary:
    name: "Pyramid Summary"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()
    timeout-minutes: 2

    steps:
      - name: Report pyramid results
        run: |
          echo "## Test Pyramid Results" >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Layer 1 — Unit (70%) | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Layer 2 — Integration (20%) | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Layer 3 — E2E (10%) | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
