apiVersion: v1
kind: Service
metadata:
  name: care-harmony-hub
  namespace: default
  labels:
    app: care-harmony-hub
    version: v1
spec:
  type: LoadBalancer
  selector:
    app: care-harmony-hub
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
  sessionAffinity: None
  loadBalancerSourceRanges: []
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: care-harmony-hub-ingress
  namespace: default
  labels:
    app: care-harmony-hub
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - care-harmony-hub.local
        - api.care-harmony-hub.local
      secretName: care-harmony-hub-tls
  rules:
    - host: care-harmony-hub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: care-harmony-hub
                port:
                  number: 80
    - host: api.care-harmony-hub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: care-harmony-hub
                port:
                  number: 80
